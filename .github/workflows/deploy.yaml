name: Deploy Gateway Server

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:
    inputs:
      action:
        description: "실행할 작업"
        type: choice
        default: deploy-only
        options:
          - scale-out-and-deploy   # gateway-2, 3 기동 + 전체 배포
          - deploy-only            # 현재 RUNNING인 VM에만 배포
          - scale-in               # gateway-2, 3 중지만 (배포 없음)
      force_apply_retention_policy:
        description: "AR retention policy 적용"
        type: boolean
        default: false

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  AR_IMAGE_PATH: ${{ vars.AR_IMAGE_PATH }}
  WORK_DIR: /opt/gateway
  HEALTH_RETRIES: 30
  HEALTH_INTERVAL: 10

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. 이미지 빌드 & Artifact Registry 푸시
  #    - push / workflow_dispatch 모두 실행
  #    - scale-in 선택 시 스킵
  # ────────────────────────────────────────────────────────────
  build-and-push:
    if: github.event.inputs.action != 'scale-in'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve image metadata
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          REGISTRY_HOST=$(echo "$AR_IMAGE_PATH" | cut -d/ -f1)
          echo "registry_host=${REGISTRY_HOST}" >> "$GITHUB_OUTPUT"

      - name: Apply AR Image Retention Policy
        if: |
          contains(toJSON(github.event.commits.*.modified), 'deploy/ar-image-retention-policy.json') ||
          contains(toJSON(github.event.commits.*.added), 'deploy/ar-image-retention-policy.json') ||
          (github.event_name == 'workflow_dispatch' && inputs.force_apply_retention_policy)
        run: |
          REPO_NAME=$(echo "$AR_IMAGE_PATH" | cut -d/ -f3)
          POLICY_FILE="deploy/ar-image-retention-policy.json"

          if [ ! -f "$POLICY_FILE" ]; then
            echo "Error: $POLICY_FILE not found"
            exit 1
          fi

          REGION=$(echo "$AR_IMAGE_PATH" | sed 's/-docker\.pkg\.dev.*//')
          gcloud artifacts repositories set-cleanup-policies "$REPO_NAME" \
            --project="$GCP_PROJECT" \
            --location="${REGION}" \
            --policy="$POLICY_FILE" \
            --quiet
          echo "Successfully synced retention policy from $POLICY_FILE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry_host }}
          username: 'oauth2accesstoken'
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.AR_IMAGE_PATH }}:${{ steps.meta.outputs.tag }}
            ${{ env.AR_IMAGE_PATH }}:latest
          secrets: |
            GPR_USER=${{ secrets.GPR_USER }}
            GPR_TOKEN=${{ secrets.GPR_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # 2. [신규] Scale-out: gateway-server-2, 3 기동
  #    - workflow_dispatch + action == 'scale-out-and-deploy' 일 때만 실행
  # ────────────────────────────────────────────────────────────
  scale-out:
    needs: build-and-push
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'scale-out-and-deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Start gateway-server-2, gateway-server-3
        run: |
          for ENTRY in "gateway-server-2:asia-northeast3-b" "gateway-server-3:asia-northeast3-c"; do
            VM="${ENTRY%%:*}"
            ZONE="${ENTRY##*:}"

            STATUS=$(gcloud compute instances describe "$VM" \
              --zone="$ZONE" \
              --project="$GCP_PROJECT" \
              --format="value(status)" 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "::error::$VM not found in $ZONE — VM을 먼저 생성해 주세요"
              exit 1
            fi

            if [ "$STATUS" = "TERMINATED" ]; then
              echo "▶ Starting $VM ($ZONE)..."
              gcloud compute instances start "$VM" \
                --zone="$ZONE" \
                --project="$GCP_PROJECT"
            else
              echo "✅ $VM is already $STATUS — skipping start"
            fi
          done

      - name: Wait for VMs to be RUNNING
        run: |
          for ENTRY in "gateway-server-2:asia-northeast3-b" "gateway-server-3:asia-northeast3-c"; do
            VM="${ENTRY%%:*}"
            ZONE="${ENTRY##*:}"

            echo "⏳ Waiting for $VM to be RUNNING..."
            for attempt in $(seq 1 20); do
              STATUS=$(gcloud compute instances describe "$VM" \
                --zone="$ZONE" \
                --project="$GCP_PROJECT" \
                --format="value(status)")

              if [ "$STATUS" = "RUNNING" ]; then
                echo "✅ $VM is RUNNING"
                break
              fi

              if [ "$attempt" = "20" ]; then
                echo "::error::$VM did not reach RUNNING state in time"
                exit 1
              fi

              echo "  $VM is $STATUS... ($attempt/20)"
              sleep 15
            done
          done

  # ────────────────────────────────────────────────────────────
  # 3. 배포
  #    - push to main  → gateway-server-1 고정 배포
  #    - deploy-only   → 현재 RUNNING인 VM에만 배포
  #    - scale-out-and-deploy → 3대 모두 배포
  #    - scale-in      → 스킵
  # ────────────────────────────────────────────────────────────
  deploy:
    needs: [ build-and-push, scale-out ]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.scale-out.result == 'success' || needs.scale-out.result == 'skipped') &&
      github.event.inputs.action != 'scale-in' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - vm: gateway-server-1
            zone: asia-northeast3-a
          - vm: gateway-server-2
            zone: asia-northeast3-b
          - vm: gateway-server-3
            zone: asia-northeast3-c
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # TERMINATED 상태이면 이후 모든 step 스킵
      - name: Check VM status
        id: vm-status
        run: |
          STATUS=$(gcloud compute instances describe ${{ matrix.vm }} \
            --zone="${{ matrix.zone }}" \
            --project="$GCP_PROJECT" \
            --format="value(status)" 2>/dev/null || echo "NOT_FOUND")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.vm }} → $STATUS"

      - name: Resolve rollback target
        id: rollback
        if: steps.vm-status.outputs.status == 'RUNNING'
        run: |
          STABLE=$(gcloud artifacts docker tags list "$AR_IMAGE_PATH" \
            --project="$GCP_PROJECT" \
            --filter="tag=stable" \
            --format="value(tag)" 2>/dev/null | head -n1)

          if [ -n "$STABLE" ]; then
            echo "tag=stable" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No stable tag yet — first deploy. Rollback will be skipped."
          fi

      - name: Sync compose file to ${{ matrix.vm }}
        if: steps.vm-status.outputs.status == 'RUNNING'
        run: |
          gcloud compute scp deploy/docker-compose.prod.yaml \
            ${{ matrix.vm }}:/tmp/docker-compose.prod.yaml \
            --zone="${{ matrix.zone }}" \
            --project="$GCP_PROJECT" \
            --tunnel-through-iap

      - name: Deploy and verify on ${{ matrix.vm }}
        id: deploy_run
        if: steps.vm-status.outputs.status == 'RUNNING'
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          AR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          REGISTRY_HOST=$(echo "$AR_IMAGE_PATH" | cut -d/ -f1)

          gcloud compute ssh ${{ matrix.vm }} \
            --zone="${{ matrix.zone }}" \
            --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --command="
              set -e

              echo '$AR_TOKEN' | sudo docker login -u oauth2accesstoken --password-stdin https://$REGISTRY_HOST

              sudo mkdir -p $WORK_DIR
              sudo mv /tmp/docker-compose.prod.yaml $WORK_DIR/docker-compose.prod.yaml
              cd $WORK_DIR

              export IMAGE_TAG='$NEW_TAG'
              export AR_IMAGE_PATH='${{ env.AR_IMAGE_PATH }}'

              sudo env IMAGE_TAG=\"$NEW_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml pull
              sudo env IMAGE_TAG=\"$NEW_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml up -d

              echo 'Checking actuator health (max $HEALTH_RETRIES x ${HEALTH_INTERVAL}s)...'
              HEALTHY=0
              for i in \$(seq 1 $HEALTH_RETRIES); do
                if curl -sf http://localhost:8090/actuator/health \
                    | grep -q '\"status\":\"UP\"'; then
                  echo \"Actuator UP (attempt \$i)\"
                  HEALTHY=1
                  break
                fi
                echo \"Waiting for service... (\$i/$HEALTH_RETRIES)\"
                sleep $HEALTH_INTERVAL
              done

              if [ \"\$HEALTHY\" != '1' ]; then
                echo 'Actuator health check failed.'
                exit 1
              fi
            "

      - name: Rollback ${{ matrix.vm }}
        if: failure() && steps.deploy_run.conclusion == 'failure' && steps.rollback.outputs.tag != ''
        env:
          ROLLBACK_TAG: ${{ steps.rollback.outputs.tag }}
          AR_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set +e
          REGISTRY_HOST=$(echo "$AR_IMAGE_PATH" | cut -d/ -f1)

          attempt_rollback() {
            gcloud compute ssh ${{ matrix.vm }} \
              --zone="${{ matrix.zone }}" \
              --project="$GCP_PROJECT" \
              --tunnel-through-iap \
              --command="
                set -e

                echo '$AR_TOKEN' | sudo docker login -u oauth2accesstoken --password-stdin https://$REGISTRY_HOST

                cd $WORK_DIR

                sudo docker compose -f docker-compose.prod.yaml down --remove-orphans -t 5 || true

                export IMAGE_TAG='$ROLLBACK_TAG'
                export AR_IMAGE_PATH='${{ env.AR_IMAGE_PATH }}'

                sudo env IMAGE_TAG=\"$ROLLBACK_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml pull
                sudo env IMAGE_TAG=\"$ROLLBACK_TAG\" AR_IMAGE_PATH=\"${{ env.AR_IMAGE_PATH }}\" docker compose -f docker-compose.prod.yaml up -d

                for i in \$(seq 1 18); do
                  if curl -sf http://localhost:8090/actuator/health \
                      | grep -q '\"status\":\"UP\"'; then
                    echo \"Rollback container UP (attempt \$i)\"
                    exit 0
                  fi
                  sleep 10
                done

                echo 'Rollback container did not become healthy.'
                exit 1
              "
          }

          for attempt in 1 2 3; do
            echo "::group::Rollback attempt $attempt/3 on ${{ matrix.vm }}"
            attempt_rollback
            RC=$?
            echo "::endgroup::"

            if [ $RC -eq 0 ]; then
              echo "Rollback succeeded on attempt $attempt."
              exit 0
            fi

            echo "Rollback attempt $attempt failed (exit=$RC)."
            if [ $attempt -lt 3 ]; then
              echo "Retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "::error::All rollback attempts failed on ${{ matrix.vm }}. Manual intervention required."
          exit 1

  # ────────────────────────────────────────────────────────────
  # 4. [신규] Scale-in: gateway-server-2, 3 중지
  #    - workflow_dispatch + action == 'scale-in' 일 때만 실행
  #    - build-and-push, deploy 없이 독립 실행
  # ────────────────────────────────────────────────────────────
  scale-in:
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'scale-in'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Stop gateway-server-2, gateway-server-3
        run: |
          for ENTRY in "gateway-server-2:asia-northeast3-b" "gateway-server-3:asia-northeast3-c"; do
            VM="${ENTRY%%:*}"
            ZONE="${ENTRY##*:}"

            STATUS=$(gcloud compute instances describe "$VM" \
              --zone="$ZONE" \
              --project="$GCP_PROJECT" \
              --format="value(status)" 2>/dev/null || echo "NOT_FOUND")

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "⚠️  $VM not found — skipping"
              continue
            fi

            if [ "$STATUS" = "RUNNING" ]; then
              echo "⏹ Stopping $VM ($ZONE)..."
              gcloud compute instances stop "$VM" \
                --zone="$ZONE" \
                --project="$GCP_PROJECT"
              echo "✅ $VM stopped"
            else
              echo "  $VM is already $STATUS — skipping"
            fi
          done

  # ────────────────────────────────────────────────────────────
  # 5. stable 태그 승격 (기존과 동일)
  # ────────────────────────────────────────────────────────────
  promote-stable:
    needs: [ build-and-push, deploy ]
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Promote new SHA to :stable tag
        run: |
          NEW_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          echo "Promoting ${AR_IMAGE_PATH}:${NEW_TAG} -> ${AR_IMAGE_PATH}:stable"
          gcloud artifacts docker tags add \
            "${AR_IMAGE_PATH}:${NEW_TAG}" \
            "${AR_IMAGE_PATH}:stable" \
            --quiet
          echo "Stable tag updated."