spring:
  application:
    name: gateway-server
  config:
    import:
      - "optional:configserver:http://34.50.50.170:13100"
      - "optional:file:.env[.properties]"
  cloud:
    config:
      allow-override: true
      override-none: true
      override-system-properties: false
      discovery:
        service-id: config-server

eureka:
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health, info

# /actuator/info 호출 시 게이트웨이 서버명 출력
info:
  app:
    name: gateway
    hostname: ${HOSTNAME}

server:
  port: 8090